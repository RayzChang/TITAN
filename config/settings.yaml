# ============================================================
# TITAN v1 — 交易參數設定檔
# 版本：V1.2（Version B 止損 / 風控暫停）
# ============================================================

# ===== 交易模式 =====
mode: "testnet"

# ===== 交易標的 =====
symbols:
  mode: "manual"
  list:
    - "BTC/USDT"
    - "ETH/USDT"

# ===== 策略設定 =====
strategy:
  name: "range_breakout"
  timeframe: "1h"

  range_breakout:
    box_lookback: 120          # 日線回望根數（約 4 個月）
    sl_pct: 3.0                # fallback 止損（箱體未偵測時用）
    addon_candles: 3           # 加倉確認：連續幾根 4H K 棒
    breakdown_vol_min: 1.5     # 箱體失效需要的最低量比

    # 手動初始箱體（以朋友畫的為基準，失效後由程式自動偵測新箱體）
    manual_boxes:
      "BTC/USDT":
        floor: 60300           # 原始箱體下緣（永久支撐）
        ceilings: [74000, 76188]  # 歷史延伸上緣（由低到高）
      "ETH/USDT":
        floor: 1740            # 原始箱體下緣
        ceilings: [2100, 2400]    # 小箱上緣 + 大箱上緣

# ===== 風險管理 =====
# 注意：風控暫時全部拔掉（2026-04-12 決定），改跑 3 天 testnet 觀察
risk:
  leverage: 100
  margin_type: "cross"
  position_size_usdt: 100
  position_size_pct: 2
  max_open_positions: 2        # 最多 2 個倉位（BTC + ETH 各一），保留
  stop_loss_pct: 3.0           # fallback 只用，實際止損由箱體邊界決定
  take_profit_pct: 6.0         # 初始 TP 6%（TP1 由 4H MACD 觸發覆蓋）
  max_daily_loss_pct: 100.0    # 停用（設為 100% 永不觸發）
  max_daily_trades: 999        # 停用
  consecutive_loss_pause: 999  # 停用
  drawdown_stop_pct: 100       # 停用
  anomaly_skip_pct: 100.0      # 停用

# ===== 資金設定 =====
capital:
  total_usdt: 5000
  reserve_pct: 0
  compound: true
  position_fixed_usdt: 100     # 每筆固定開倉 100U

# ===== 執行設定 =====
execution:
  check_interval_seconds: 30
  use_market_orders: true
  slippage_tolerance_pct: 0.1
